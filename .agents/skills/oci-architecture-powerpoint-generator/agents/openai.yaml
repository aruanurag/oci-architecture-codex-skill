interface:
  display_name: "OCI Architecture PPT"
  short_description: "Generate OCI physical PowerPoint architectures"
  default_prompt: "Use $oci-architecture-powerpoint-generator to design an OCI physical architecture as a finalized PowerPoint. Begin with a short plan and a clarifying-question gate before authoring the actual diagram. Derive any follow-up questions from the unresolved gaps found in that planning pass instead of using a fixed script, ask only the smallest useful set of questions when the remaining ambiguity would materially change topology, networking, HA or DR posture, database choice, subnet scope, service meaning, icon mapping, or layout symmetry, and explicitly say when there are no blocking questions. Present recommendations as part of that clarification pass, with the most honest option first. Select the closest bundled Oracle reference architecture as the baseline. When the user provides an Oracle solution link or another explicit reference, switch into reference replication mode: extract a structured reference summary first, write a recreation prompt, treat the reference as the source of truth for component set, topology, and major flows, then compare each rendered draft against the reference with a similarity score and iterate up to 10 times or until no meaningful improvements remain. Record the follow-up questions, the recommended options, and the selected answers in the spec's top-level clarification_gate before rendering. If a direct icon is missing or you do not fully understand the requested component, pause and present one to three recommended icon or placeholder options with the most honest fit first instead of silently guessing. Never leave a `PLACEHOLDER:` card in the slide when the service resolves to a direct or alias OCI icon. Keep regional OCI services such as `WAF` and `API Gateway` inside the `OCI Region` boundary but outside the `VCN` unless the service truly belongs on a network edge. If the slide also needs a reusable conceptual sidecar, layered subsystem explainer, or other non-topology diagram motif, route through the sibling $oci-diagram-patterns skill before improvising freeform shapes. Before final sign-off on any customer-facing PowerPoint architecture slide, route the result through the sibling $oci-ppt-design-director skill and treat that design-director review as mandatory rather than optional styling advice. Then map the workload to Oracle PowerPoint icons, keep gateways centered on the VCN border, keep icons centered within their containers, use one visible connector per semantic relationship, prefer straight or single-elbow routes, treat avoidable or multi-bend connectors as blockers, keep mirrored containers visually symmetrical unless the architecture intentionally differs, keep vertical service-to-service flows out of native or external icon captions by using side lanes or extra spacing, remove low-value internal edge labels before they crowd a dense service column, and render a finalized .pptx only after repeated render-review passes plus explicit spacing/overlap review, architectural review, and design-director review have removed misleading public or private placement, overlapping lines, diagonal or stitched connectors, detached-looking arrowheads, duplicate control markers, spilled child elements, labels sitting on connector lanes, sparse wireframe-looking regions, and previews where expected OCI icons render blank or effectively disappear. If the preview exporter falls back to `Backend: quicklook-pptx`, treat icon-visibility findings as lower-confidence for nested Oracle vector groups and pair that thumbnail with the PowerPoint geometry report plus a sibling draw.io shadow review before concluding the deck is visually broken."
