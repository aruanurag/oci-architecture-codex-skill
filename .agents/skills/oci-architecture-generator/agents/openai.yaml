interface:
  display_name: "OCI Architecture"
  short_description: "Generate OCI physical draw.io architectures"
  default_prompt: "Use $oci-architecture-generator to design an OCI physical architecture. Begin with a short planning and ambiguity-analysis pass before authoring the actual diagram. Use that plan to identify the unresolved decisions that still materially change topology, networking, HA or DR posture, database choice, subnet scope, service meaning, icon mapping, or layout discipline, and ask only the smallest useful set of follow-up questions from those gaps instead of using a fixed script. Present recommendations as part of that clarification pass, with the most honest option first. Do not ask the clarification_gate schema topics verbatim just to populate the contract. If the planning pass already settles a required topic, record it later in clarification_gate from thread context, an accepted recommendation, or an explicit assumption instead of asking a redundant question. Explicitly say when there are no blocking questions. When the user provides an Oracle solution link or another explicit reference, switch into reference replication mode: extract a structured reference summary first, write a recreation prompt, treat the reference as the source of truth for component set, topology, and major flows, then compare each rendered draft against the reference with a similarity score and iterate up to 10 times or until no meaningful improvements remain. Record the actual follow-up questions, the recommended options, and the selected answers in the spec's top-level clarification_gate before rendering. If a direct icon is missing or you do not fully understand the requested component, pause and present one to three recommended icon or placeholder options with the most honest fit first instead of silently guessing. Never leave a `PLACEHOLDER:` card in the diagram when the service resolves to a direct or alias OCI icon. Keep regional OCI services such as `WAF` and `API Gateway` inside the `OCI Region` boundary but outside the `VCN` unless the service truly belongs on a network edge. Then map the workload to approved draw.io icons, keep regional subnets as horizontal bands and `Availability Domain` grouping shapes as tall vertical background containers inside the VCN but outside the subnet boundaries for single-region multi-AD HA, represent OKE as a cluster container with worker-node groups per AD when it spans multiple ADs, route every cross-container physical flow through hidden boundary anchors, place Internet/NAT/Service Gateways directly on the relevant boundary instead of drawing decorative stub lines, prefer straight connectors first, treat avoidable elbows as blockers, keep any necessary elbows orthogonal and aligned, treat two or more bends on one visible connector as suspect by default, keep mirrored containers visually symmetrical unless the architecture intentionally differs, keep arrowheads only on final destination segments, keep vertical service-to-service flows out of external caption boxes by using side anchors or extra spacing, remove low-value internal edge labels before they crowd a dense service panel, and produce a finalized .drawio diagram only after repeated render-review passes plus explicit spacing and overlap review and architectural review have removed overlapping lines, diagonal or stacked traffic arrows, avoidable elbows, stretched icons, detached-looking arrowheads, unresolved closest or placeholder icon mappings, labels sitting on connector lanes, sparse wireframe-looking regions, previews where expected icons are visually blank, child containers or icons whose center point falls outside their parent boundary, and elements that spill outside parent boundaries or only almost reach subnet or service boundaries. Use the renderer quality gate and require two consecutive clean reviews before sharing the result."
