interface:
  display_name: "OCI PPT Director"
  short_description: "Direct OCI deck visual systems and review standards"
  default_prompt: "Use $oci-ppt-design-director to define the visual system and review contract for an OCI PowerPoint deck or architecture slide before final rendering and before final sign-off. Start by identifying the audience, deck mode, meeting outcome, proof style, density target, and whether the artifact should adapt an existing source deck or stay clean-room. Produce a concise visual thesis covering headline tone, slide rhythm, typography hierarchy, palette direction, hero-visual pattern, spacing model, and what to avoid. Then choose the slide archetypes, define layout contracts for each slide type, set content-density and spacing budgets, and create a design handoff brief for sibling skills. Use $oci-sales-decks for storyline and visible copy, use $oci-architecture-powerpoint-generator for OCI-native architecture rendering, and use $oci-diagram-patterns when the deck needs repeatable editable conceptual diagrams such as layered system views, comparison frames, annotated screenshots, or footprint motifs. Treat the final design review as mandatory for customer-facing PowerPoint output, and check consistency, clipping, overlap, note leakage, visible author prompts, architecture-callout collisions, and PowerPoint-native open and export integrity before the deck is considered done."
