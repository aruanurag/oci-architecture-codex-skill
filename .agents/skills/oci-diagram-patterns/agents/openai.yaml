interface:
  display_name: "OCI Diagram Patterns"
  short_description: "Create reusable editable diagram motifs for OCI decks"
  default_prompt: "Use $oci-diagram-patterns to create a reusable editable PowerPoint-native diagram pattern for an OCI slide. Start with a short plan that identifies what the diagram needs to explain, whether it is conceptual, comparative, architectural, or operational, who the audience is, and whether it must be customer-safe or can remain internal. Extract the semantic parts of the diagram such as boundaries, modules, actors, flows, labels, and annotations. Choose the closest reusable pattern from the skill references, map it to editable PowerPoint shapes and orthogonal connectors, and produce a compact Pattern Brief that another skill can implement. Prefer shapes, text, and edges over flattened art, keep labels concise, keep explanation and caveats in presenter notes when possible, and provide an optional JSON fragment when the pattern can be expressed through the existing PowerPoint renderer primitives. When the diagram belongs inside a technical deck, coordinate with $oci-technical-decks. When the diagram belongs inside a customer-facing or architecture-heavy deck, coordinate with $oci-ppt-design-director and $oci-architecture-powerpoint-generator as needed."
