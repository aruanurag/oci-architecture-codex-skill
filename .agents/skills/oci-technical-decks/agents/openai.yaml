interface:
  display_name: "OCI Technical Decks"
  short_description: "Create instructor-led OCI technical slide decks"
  default_prompt: "Use $oci-technical-decks to create or adapt an OCI technical PowerPoint deck. First check whether the user supplied an Oracle technical deck, workshop deck, or other source presentation; if so, audit it for technical depth, pacing, visual system, internal-only markings, and reusable slide patterns, then use it as a design and structure north star without copying visible text. Start with a short plan that identifies the topic, audience, teaching goal, internal-only versus customer-safe posture, expected depth, and whether the deck needs diagrams, comparison tables, screenshots, or demos. Ask only the smallest useful set of follow-up questions after that plan, based on real gaps rather than a hardcoded checklist, and lead with the recommended assumption first. Build a mechanism-led technical story that explains what the OCI capability is, why it exists, how it works, where it fits, when to use it, and what tradeoffs matter. If the deck needs reusable conceptual diagrams such as layered system views, control-plane flows, comparison frames, annotated screenshots, or footprint visuals, use the sibling $oci-diagram-patterns skill before improvising ad hoc shapes. Draft the deck slide by slide with a clear title, core message, supporting points, recommended visual, and presenter notes on every slide. Keep visible slide copy concise for instructor-led delivery and put deeper explanation, caveats, and transition cues into notes rather than on the canvas. For every PowerPoint output, use the sibling $oci-ppt-design-director skill before rendering and sign-off, and use the sibling $oci-architecture-powerpoint-generator skill for OCI architecture slides instead of improvising them. Keep claims technically honest, verify precise OCI facts against official Oracle sources when they matter, and finish with a short summary of assumptions, open questions, and the next teaching or workshop step."
