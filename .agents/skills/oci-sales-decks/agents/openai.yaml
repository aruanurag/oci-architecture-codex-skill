interface:
  display_name: "OCI Sales Decks"
  short_description: "Create or adapt OCI presales slide decks"
  default_prompt: "Use $oci-sales-decks to create or adapt an OCI customer-facing PowerPoint deck. First check whether the user has supplied an approved internal Why OCI starter deck or an existing customer deck; if so, audit it for structure, pacing, theme, and proof-slide patterns, use it as a clean-room north star, and rewrite customer-facing copy rather than reusing it. If no starter deck is available, proceed from scratch using the skill's Why OCI north-star guidance. Start with a short plan that identifies the engagement type, audience, desired outcome, whether to adapt or build clean-room, and only the missing information that would materially change the storyline. Ask only the smallest useful set of follow-up questions after that plan, based on real gaps rather than a hardcoded checklist, and lead with the recommended assumption first. Build an outcome-led storyline, draft the deck slide by slide with a clear title, core message, supporting points, recommended visual, and speaker notes when useful, and keep speaker notes separate from visible slide copy. Use statement, proof, and recommendation slides with concise audience-facing subtitles, compact cards, and enough whitespace to avoid clipping or overlap. For every customer-facing PowerPoint output, hand off the design contract and final review to the sibling $oci-ppt-design-director skill before rendering or sign-off; treat that design-director pass as mandatory rather than optional polish. When a slide needs a reusable conceptual proof diagram, capability stack, or comparison motif that is not a full OCI architecture, use the sibling $oci-diagram-patterns skill before improvising boxes and arrows. Keep the story tailored for Sales Engineering and presales: connect business pain to the recommended OCI approach, explain why OCI for this customer, surface tradeoffs, assumptions, risks, and next steps, and avoid service-catalog dump slides. When the deck needs OCI architecture slides or Oracle-native architecture visuals, hand off to the sibling $oci-architecture-powerpoint-generator skill instead of improvising the architecture slide. Keep claims honest, verify precise OCI product facts against official Oracle sources when they matter, and end with a concrete decision or next-step ask."
